<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tony Kill Records</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
}

/* fundo dividido */
.container{
    display:flex;
    height:100vh;
}

/* lado verde */
.left{
    width:70%;
    background:linear-gradient(135deg,#c8ff6c,#a8ff4d);
    position:relative;
    padding:120px;
}

/* lado bege */
.right{
    width:30%;
    background:linear-gradient(135deg,#e9d3a4,#d8c28c);
}

/* faixa rosa */
.highlight{
    position:absolute;
    width:340px;
    height:50px;
    background:#e7a7b7;
    top:175px;
    left:110px;
    z-index:1;
}

/* titulo */
h1{
    font-size:70px;
    color:#eaeaea;
    font-weight:900;
    line-height:70px;
    position:relative;
    z-index:2;
}

.subtitle{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

/* botão */
button{
    margin-top:50px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#e7a7b7;
    font-size:16px;
    cursor:pointer;
}

/* estrelas */
.star{
    position:absolute;
    width:60px;
    height:60px;
    background:#7da2c4;
    clip-path:polygon(
        50% 0%, 
        61% 35%, 
        98% 35%, 
        68% 57%, 
        79% 91%, 
        50% 70%, 
        21% 91%, 
        32% 57%, 
        2% 35%, 
        39% 35%
    );
}

.star1{
    top:80px;
    left:420px;
}

.star2{
    top:140px;
    left:600px;
}

.star3{
    top:260px;
    left:520px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="highlight"></div>

<h1>TONY KILL<br>RECORD'S</h1>

<p class="subtitle">loja de cds</p>

<button>conheça a loja</button>

<div class="star star1"></div>
<div class="star star2"></div>
<div class="star star3"></div>

</div>

<div class="right"></div>

</div>

</body>
</html>
